<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nabla&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lacquer&family=Orbitron:wght@400..900&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lacquer&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://kit.fontawesome.com/4d4c5c00d7.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <header class="mainHeader">
      <h1 class="arcadiaTitle">Arcadia</h1>
      <nav class="mainNav">
        <ul class="listContainer">
          <li class="listStyle">
            <a href="./index.html" class="mainLinks">INICIO </a>
          </li>

          <li class="listStyle">
            <a href="./comprar.html" class="mainLinks">COMPRAR</a>
          </li>

          <li class="listStyle">
            <a href="./registro.html" class="mainLinks">REGISTRATE</a>
          </li>
        </ul>
      </nav>
    </header>
    <main class="mainContainerForm">
      <div class="textAndFormContainer">
        <h2 class="formTitle">Iniciar Sesión</h2>

        <form class="formContainer" aria-label="Formulario de Inicio de Sesión">
          <label class="labelForm" for="Nombre">Nombre de usuario</label>
          <input
            class="inputForm"
            type="text"
            id="Nombre"
            name="nombre"
            required
            aria-required="true"
          />
          <label class="labelForm" for="password">Contraseña</label>
          <input
            class="inputForm"
            type="password"
            id="password"
            name="password"
            required
            aria-required="true"
            aria-label="campo para ingresar contraseña"
          />

          <button class="buttonForm" type="submit">Iniciar Sesión</button>

          <p class="formParagraphRegistro">¿No sos parte de Arcadia?</p>
          <a href="./registro.html" class="formLink">Registrate ahora</a>
        </form>
      </div>
    </main>
    <footer class="footerContainer">
      <div class="footerParagraphContainer">
        <p class="paragraphFooter">© 2026 Arcadia</p>
        <p class="paragraphFooter">Diseñado por FairyVamp</p>
      </div>
      <div class="logoContainer">
        <a
          class="footerLinks"
          href="https://www.instagram.com/_fairyvamp_/"
          target="_blank"
          ><img class="imgFooter" src="./Img/instagram.svg" alt="Instagram" />
        </a>

        <a
          class="footerLinks"
          href="https://www.youtube.com/channel/UCQhK6UIHkdx-e2VT9ptcf2A"
          target="_blank"
        >
          <img class="imgFooter" src="./Img/youtube.svg" alt="youtube" />
        </a>

        <a
          class="footerLinks"
          href="https://www.twitch.tv/fairyvamp_"
          target="_blank"
        >
          <img class="imgFooter" src="./Img/twitch.svg" alt="Twitch" />
        </a>
      </div>
    </footer>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
